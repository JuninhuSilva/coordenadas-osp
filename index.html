<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Coordenadas OSP</title>
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
  :root{
    --bg:#12161A;
    --panel:#1B2126;
    --panel-2:#212831;
    --line:#2B333B;
    --ink:#EDF1F4;
    --ink-dim:#8B96A1;
    --fiber:#2FD9C4;
    --fiber-dim:#1A6E64;
    --safety:#FF7A1E;
    --safety-dim:#7A3B0E;
    --danger:#FF5C5C;
    --mono: ui-monospace, "SF Mono", "Menlo", "Consolas", monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--sans);}
  body{
    padding-bottom:40px;
    min-height:100vh;
    background-image:
      radial-gradient(circle at 15% 0%, rgba(47,217,196,0.06), transparent 40%),
      radial-gradient(circle at 100% 20%, rgba(255,122,30,0.05), transparent 45%);
  }
  .wrap{max-width:520px;margin:0 auto;padding:0 16px;}

  /* HEADER */
  header{padding:22px 16px 14px;border-bottom:1px solid var(--line);}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-mark{
    width:34px;height:34px;border-radius:8px;
    background:linear-gradient(135deg,var(--fiber),var(--fiber-dim));
    display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-weight:700;color:#08201C;font-size:13px;
    flex-shrink:0;
  }
  .brand h1{font-size:15px;margin:0;letter-spacing:0.04em;text-transform:uppercase;font-weight:800;}
  .brand p{margin:1px 0 0;font-size:11.5px;color:var(--ink-dim);letter-spacing:0.03em;}

  .wo-row{margin-top:16px;}
  .wo-row label{display:block;font-size:10.5px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:6px;font-weight:700;}
  .wo-input{
    width:100%;background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:12px 14px;color:var(--ink);font-family:var(--mono);font-size:16px;font-weight:600;
    letter-spacing:0.02em;
  }
  .wo-input:focus{outline:none;border-color:var(--fiber);}
  .wo-history-btn{
    margin-top:10px;background:none;border:none;color:var(--fiber);font-size:12.5px;
    font-weight:700;padding:4px 0;display:flex;align-items:center;gap:5px;
  }

  /* CAPTURE PANEL */
  .capture-panel{margin-top:20px;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px 16px 16px;}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
  .chip{
    padding:8px 13px;border-radius:20px;border:1px solid var(--line);background:var(--panel-2);
    color:var(--ink-dim);font-size:12.5px;font-weight:700;letter-spacing:0.02em;
  }
  .chip.active{background:rgba(47,217,196,0.12);border-color:var(--fiber);color:var(--fiber);}
  .chip.custom-active{background:rgba(255,122,30,0.12);border-color:var(--safety);color:var(--safety);}

  .custom-label-row{display:none;margin-bottom:14px;}
  .custom-label-row.show{display:block;}
  .custom-label-row input{
    width:100%;background:var(--panel-2);border:1px solid var(--line);border-radius:10px;
    padding:10px 12px;color:var(--ink);font-size:14px;font-family:var(--sans);
  }

  .fix-stage{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:22px 0 8px;
  }
  .radar{
    position:relative;width:126px;height:126px;display:flex;align-items:center;justify-content:center;
    margin-bottom:14px;
  }
  .ring{position:absolute;border-radius:50%;border:1px solid var(--fiber-dim);}
  .ring1{width:126px;height:126px;}
  .ring2{width:88px;height:88px;}
  .ring3{width:50px;height:50px;}
  .radar.locking .ring{border-color:var(--fiber);animation:pulse 1.4s ease-out infinite;}
  .radar.locking .ring2{animation-delay:0.2s;}
  .radar.locking .ring3{animation-delay:0.4s;}
  @keyframes pulse{
    0%{transform:scale(0.7);opacity:0;}
    40%{opacity:1;}
    100%{transform:scale(1.15);opacity:0;}
  }
  .radar-core{
    position:relative;z-index:2;width:14px;height:14px;border-radius:50%;
    background:var(--ink-dim);
  }
  .radar.locking .radar-core{background:var(--fiber);box-shadow:0 0 14px rgba(47,217,196,0.7);}
  .radar.done .radar-core{background:var(--safety);box-shadow:0 0 14px rgba(255,122,30,0.6);}

  .fix-status{font-family:var(--mono);font-size:11px;letter-spacing:0.08em;color:var(--ink-dim);text-transform:uppercase;min-height:16px;margin-bottom:14px;}
  .fix-status.locking{color:var(--fiber);}
  .fix-status.error{color:var(--danger);}

  .readout{
    width:100%;background:var(--panel-2);border:1px solid var(--line);border-radius:12px;
    padding:12px 14px;margin-bottom:14px;font-family:var(--mono);font-size:12.5px;line-height:1.9;
    display:none;
  }
  .readout.show{display:block;}
  .readout .rline{display:flex;justify-content:space-between;color:var(--ink-dim);}
  .readout .rline span:last-child{color:var(--ink);font-weight:600;}

  .capture-btn{
    width:100%;padding:16px;border-radius:12px;border:none;
    background:var(--fiber);color:#06231F;font-size:15px;font-weight:800;
    letter-spacing:0.03em;text-transform:uppercase;font-family:var(--sans);
  }
  .capture-btn:active{background:#25b8a6;}
  .capture-btn:disabled{background:var(--panel-2);color:var(--ink-dim);}

  /* POINTS LIST */
  .section-title{
    font-size:10.5px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-dim);
    font-weight:700;margin:24px 0 10px;display:flex;justify-content:space-between;align-items:center;
  }
  .points{display:flex;flex-direction:column;gap:8px;}
  .point-card{
    background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px;
    display:flex;align-items:center;gap:12px;
  }
  .point-badge{
    width:38px;height:38px;border-radius:9px;background:var(--panel-2);flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;
    font-weight:800;color:var(--fiber);text-align:center;line-height:1.1;
  }
  .point-info{flex:1;min-width:0;}
  .point-label{font-size:13px;font-weight:700;margin-bottom:2px;}
  .point-coords{font-family:var(--mono);font-size:11px;color:var(--ink-dim);}
  .point-del{background:none;border:none;color:var(--danger);font-size:20px;padding:4px 6px;flex-shrink:0;}
  .empty-hint{color:var(--ink-dim);font-size:12.5px;padding:14px;text-align:center;border:1px dashed var(--line);border-radius:12px;}

  /* OUTPUT */
  .output-panel{margin-top:24px;}
  .output-box{
    background:#0E1114;border:1px solid var(--line);border-radius:12px;padding:14px;
    font-family:var(--mono);font-size:12px;line-height:1.7;color:var(--ink);
    white-space:pre-wrap;word-break:break-word;max-height:280px;overflow-y:auto;
  }
  .output-actions{display:flex;gap:10px;margin-top:10px;}
  .btn-secondary{
    flex:1;padding:13px;border-radius:10px;border:1px solid var(--line);background:var(--panel);
    color:var(--ink);font-size:13px;font-weight:700;font-family:var(--sans);
  }
  .btn-secondary.primary{background:var(--safety);border-color:var(--safety);color:#2B1300;}
  .btn-secondary:active{opacity:0.7;}
  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:var(--fiber);color:#06231F;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:700;
    opacity:0;pointer-events:none;transition:opacity 0.25s;z-index:50;
  }
  .toast.show{opacity:1;}

  /* HISTORY DRAWER */
  .drawer-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,0.55);opacity:0;pointer-events:none;transition:opacity 0.2s;z-index:60;
  }
  .drawer-overlay.show{opacity:1;pointer-events:auto;}
  .drawer{
    position:fixed;left:0;right:0;bottom:0;max-height:70vh;background:var(--panel);
    border-radius:18px 18px 0 0;border-top:1px solid var(--line);
    transform:translateY(100%);transition:transform 0.25s;z-index:61;padding:16px 16px 24px;
    display:flex;flex-direction:column;
  }
  .drawer.show{transform:translateY(0);}
  .drawer-handle{width:36px;height:4px;background:var(--line);border-radius:2px;margin:0 auto 14px;}
  .drawer h2{font-size:14px;margin:0 0 12px;text-transform:uppercase;letter-spacing:0.08em;}
  .drawer-list{overflow-y:auto;display:flex;flex-direction:column;gap:8px;}
  .drawer-item{
    display:flex;justify-content:space-between;align-items:center;background:var(--panel-2);
    border-radius:10px;padding:12px 14px;
  }
  .drawer-item b{font-family:var(--mono);font-size:13px;}
  .drawer-item span{font-size:11px;color:var(--ink-dim);}
  .drawer-item button{background:none;border:none;color:var(--fiber);font-size:12px;font-weight:700;}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">
      <div class="brand-mark"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#08201C" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-6.5-5.7-6.5-10.5a6.5 6.5 0 0 1 13 0C18.5 15.3 12 21 12 21z"/><circle cx="12" cy="10.5" r="2.4"/></svg></div>
      <div>
        <h1>Coordenadas OSP</h1>
        <p>Captura de pontos FTTH em campo</p>
      </div>
    </div>
    <div class="wo-row">
      <label for="woInput">Work Order</label>
      <input id="woInput" class="wo-input" placeholder="Ex: 18246354" inputmode="numeric">
    </div>
    <button class="wo-history-btn" id="openHistory">&#8635; Ver WOs guardadas</button>
  </header>

  <div class="capture-panel">
    <div class="chips" id="chips"></div>
    <div class="custom-label-row" id="customRow">
      <input id="customLabel" placeholder="Nome do ponto (ex: P4)">
    </div>

    <div class="fix-stage">
      <div class="radar" id="radar">
        <div class="ring ring1"></div>
        <div class="ring ring2"></div>
        <div class="ring ring3"></div>
        <div class="radar-core"></div>
      </div>
      <div class="fix-status" id="fixStatus">Toque para captar posição</div>
      <div class="readout" id="readout">
        <div class="rline"><span>Latitude</span><span id="rLat">—</span></div>
        <div class="rline"><span>Longitude</span><span id="rLon">—</span></div>
        <div class="rline"><span>Altitude</span><span id="rAlt">—</span></div>
        <div class="rline"><span>Precisão</span><span id="rAcc">—</span></div>
      </div>
    </div>
    <button class="capture-btn" id="captureBtn">Capturar Ponto</button>
  </div>

  <div class="section-title">Pontos capturados <span id="pointCount">0</span></div>
  <div class="points" id="pointsList">
    <div class="empty-hint">Ainda sem pontos. Escolha uma etiqueta acima e capture.</div>
  </div>

  <div class="output-panel">
    <div class="section-title">Texto para o registo</div>
    <div class="output-box" id="outputBox">Sem pontos ainda.</div>
    <div class="output-actions">
      <button class="btn-secondary" id="shareBtn">Partilhar</button>
      <button class="btn-secondary primary" id="copyBtn">Copiar</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<div class="drawer-overlay" id="drawerOverlay"></div>
<div class="drawer" id="drawer">
  <div class="drawer-handle"></div>
  <h2>WOs guardadas</h2>
  <div class="drawer-list" id="drawerList"></div>
</div>

<script>
const LABELS = ["P1 PDO","CVP PDO","P2","P3","EP Cliente"];
let activeLabel = LABELS[0];
let isCustom = false;
let currentWo = "";
let points = [];
let lastFix = null;

const chipsEl = document.getElementById('chips');
const customRow = document.getElementById('customRow');
const customLabelInput = document.getElementById('customLabel');
const woInput = document.getElementById('woInput');
const radar = document.getElementById('radar');
const fixStatus = document.getElementById('fixStatus');
const readout = document.getElementById('readout');
const captureBtn = document.getElementById('captureBtn');
const pointsList = document.getElementById('pointsList');
const pointCount = document.getElementById('pointCount');
const outputBox = document.getElementById('outputBox');
const toast = document.getElementById('toast');

function renderChips(){
  chipsEl.innerHTML = '';
  LABELS.forEach(l=>{
    const c = document.createElement('button');
    c.className = 'chip' + (!isCustom && activeLabel===l ? ' active':'');
    c.textContent = l;
    c.onclick = ()=>{ isCustom=false; activeLabel=l; customRow.classList.remove('show'); renderChips(); };
    chipsEl.appendChild(c);
  });
  const cc = document.createElement('button');
  cc.className = 'chip' + (isCustom ? ' custom-active':'');
  cc.textContent = '+ Outro';
  cc.onclick = ()=>{ isCustom=true; customRow.classList.add('show'); customLabelInput.focus(); renderChips(); };
  chipsEl.appendChild(cc);
}
renderChips();

function showToast(msg){
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'), 1800);
}

function fmtComma(n, dec){
  return n.toFixed(dec).replace('.', ',');
}

function currentLabelText(){
  if(isCustom) return (customLabelInput.value || 'Ponto').trim();
  return activeLabel;
}

captureBtn.addEventListener('click', ()=>{
  if(!navigator.geolocation){
    fixStatus.textContent = 'Geolocalização não suportada neste navegador';
    fixStatus.className = 'fix-status error';
    return;
  }
  radar.className = 'radar locking';
  fixStatus.textContent = 'A obter posição...';
  fixStatus.className = 'fix-status locking';
  captureBtn.disabled = true;
  readout.classList.remove('show');

  // Coleta múltiplas leituras e fica com a mais precisa.
  const GOOD_ACC = 6;      // pára cedo se precisão <= 6 m
  const MAX_WAIT = 20000;  // tempo máximo de coleta (ms)
  let best = null;
  let finished = false;

  const finish = ()=>{
    if(finished) return;
    finished = true;
    clearTimeout(timer);
    navigator.geolocation.clearWatch(watchId);
    if(!best){
      radar.className = 'radar';
      fixStatus.textContent = 'Tempo esgotado a obter GPS. Tente novamente ao ar livre.';
      fixStatus.className = 'fix-status error';
      captureBtn.disabled = false;
      return;
    }
    const {latitude, longitude, altitude, accuracy} = best;
    lastFix = best;
    radar.className = 'radar done';
    fixStatus.textContent = 'Posição obtida (±' + Math.round(accuracy) + ' m)';
    fixStatus.className = 'fix-status';
    captureBtn.disabled = false;

    document.getElementById('rLat').textContent = latitude.toFixed(5);
    document.getElementById('rLon').textContent = longitude.toFixed(5);
    document.getElementById('rAlt').textContent = (altitude!=null ? Math.round(altitude)+' m' : '— (sem dados)');
    document.getElementById('rAcc').textContent = (accuracy!=null ? Math.round(accuracy)+' m' : '—');
    readout.classList.add('show');

    addPoint(currentLabelText(), latitude, longitude, altitude, accuracy);
    if(isCustom) customLabelInput.value = '';
  };

  const timer = setTimeout(finish, MAX_WAIT);

  const watchId = navigator.geolocation.watchPosition(pos=>{
    const c = pos.coords;
    if(c.accuracy == null) return;
    if(!best || c.accuracy < best.accuracy){
      best = {latitude: c.latitude, longitude: c.longitude, altitude: c.altitude, accuracy: c.accuracy};
    }
    fixStatus.textContent = 'A refinar posição... (±' + Math.round(best.accuracy) + ' m)';
    if(best.accuracy <= GOOD_ACC) finish();
  }, err=>{
    clearTimeout(timer);
    if(finished) return;
    finished = true;
    navigator.geolocation.clearWatch(watchId);
    radar.className = 'radar';
    captureBtn.disabled = false;
    let msg = 'Não foi possível obter a posição.';
    if(err.code === 1) msg = 'Permissão de localização negada. Ative-a nas definições.';
    if(err.code === 3) msg = 'Tempo esgotado a obter GPS. Tente novamente ao ar livre.';
    fixStatus.textContent = msg;
    fixStatus.className = 'fix-status error';
  }, { enableHighAccuracy: true, timeout: MAX_WAIT, maximumAge: 0 });
});

function addPoint(label, lat, lon, alt, acc){
  points.push({
    id: Date.now()+Math.random(),
    label, lat, lon,
    alt: (alt!=null ? Math.round(alt) : null),
    acc: (acc!=null ? Math.round(acc) : null)
  });
  renderPoints();
  saveCurrentWo();
}

function removePoint(id){
  points = points.filter(p=>p.id!==id);
  renderPoints();
  saveCurrentWo();
}

function renderPoints(){
  pointCount.textContent = points.length;
  if(points.length===0){
    pointsList.innerHTML = '<div class="empty-hint">Ainda sem pontos. Escolha uma etiqueta acima e capture.</div>';
  } else {
    pointsList.innerHTML = '';
    points.forEach(p=>{
      const card = document.createElement('div');
      card.className = 'point-card';
      card.innerHTML = `
        <div class="point-badge">${p.label.split(' ').map(w=>w[0]).join('').slice(0,3).toUpperCase()}</div>
        <div class="point-info">
          <div class="point-label">${p.label}</div>
          <div class="point-coords">${fmtComma(p.lat,5)}, ${fmtComma(p.lon,5)}</div>
        </div>
        <button class="point-del" data-id="${p.id}">&times;</button>
      `;
      card.querySelector('.point-del').onclick = ()=>removePoint(p.id);
      pointsList.appendChild(card);
    });
  }
  renderOutput();
}

function buildOutputText(){
  const wo = woInput.value.trim();
  let out = '';
  out += 'Wo=' + (wo || '—') + '\n\n';
  points.forEach((p, idx)=>{
    out += p.label + '\n';
    out += 'Latitude: ' + fmtComma(p.lat,5) + '\n';
    out += 'Longitude: ' + fmtComma(p.lon,5) + '\n';
    out += 'Altitude: ' + (p.alt!=null ? p.alt+' m' : '—') + '\n';
    out += 'Precisão: ' + (p.acc!=null ? p.acc+' m' : '—') + '\n\n';
    out += 'http://maps.google.com/?q=' + p.lat.toFixed(5) + ',' + p.lon.toFixed(5) + '\n';
    if(idx < points.length-1) out += '\n';
  });
  return out.trim();
}

function renderOutput(){
  outputBox.textContent = points.length ? buildOutputText() : 'Sem pontos ainda.';
}

woInput.addEventListener('input', ()=>{ renderOutput(); saveCurrentWo(); });

document.getElementById('copyBtn').addEventListener('click', async ()=>{
  if(!points.length) return;
  const text = buildOutputText();
  try{
    await navigator.clipboard.writeText(text);
    showToast('Copiado');
  }catch(e){
    // fallback
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    showToast('Copiado');
  }
});

document.getElementById('shareBtn').addEventListener('click', async ()=>{
  if(!points.length) return;
  const text = buildOutputText();
  if(navigator.share){
    try{ await navigator.share({ text }); }catch(e){}
  } else {
    try{
      await navigator.clipboard.writeText(text);
      showToast('Partilha não suportada — texto copiado');
    }catch(e){}
  }
});

/* ---- Persistência por WO (localStorage) ---- */
if(!window.storage){
  window.storage = {
    async set(key, value){ localStorage.setItem('osp:'+key, value); },
    async get(key){
      const v = localStorage.getItem('osp:'+key);
      if(v === null) throw new Error('not found');
      return { value: v };
    }
  };
}
async function saveCurrentWo(){
  const wo = woInput.value.trim();
  if(!wo) return;
  try{
    await window.storage.set('wo:'+wo, JSON.stringify({ wo, points, updated: Date.now() }));
    let list = [];
    try{
      const r = await window.storage.get('wo-list');
      list = JSON.parse(r.value);
    }catch(e){ list = []; }
    if(!list.includes(wo)) list.unshift(wo);
    list = list.slice(0, 50);
    await window.storage.set('wo-list', JSON.stringify(list));
  }catch(e){ console.error('Erro ao guardar', e); }
}

async function loadWo(wo){
  try{
    const r = await window.storage.get('wo:'+wo);
    const data = JSON.parse(r.value);
    woInput.value = data.wo;
    points = data.points || [];
    renderPoints();
    closeDrawer();
    showToast('WO ' + wo + ' carregada');
  }catch(e){
    showToast('Não encontrada');
  }
}

async function openHistory(){
  const listEl = document.getElementById('drawerList');
  listEl.innerHTML = '<div class="empty-hint">A carregar...</div>';
  document.getElementById('drawerOverlay').classList.add('show');
  document.getElementById('drawer').classList.add('show');
  try{
    const r = await window.storage.get('wo-list');
    const list = JSON.parse(r.value);
    if(!list.length){
      listEl.innerHTML = '<div class="empty-hint">Sem WOs guardadas ainda.</div>';
      return;
    }
    listEl.innerHTML = '';
    for(const wo of list){
      const item = document.createElement('div');
      item.className = 'drawer-item';
      item.innerHTML = `<div><b>WO ${wo}</b></div><button>Abrir</button>`;
      item.querySelector('button').onclick = ()=>loadWo(wo);
      listEl.appendChild(item);
    }
  }catch(e){
    listEl.innerHTML = '<div class="empty-hint">Sem WOs guardadas ainda.</div>';
  }
}
function closeDrawer(){
  document.getElementById('drawerOverlay').classList.remove('show');
  document.getElementById('drawer').classList.remove('show');
}
document.getElementById('openHistory').addEventListener('click', openHistory);
document.getElementById('drawerOverlay').addEventListener('click', closeDrawer);

renderOutput();
